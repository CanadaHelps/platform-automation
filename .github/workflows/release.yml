name: Release (Semantic)

# Reusable semantic-release workflow.
# Caller is responsible for the push/dispatch trigger and passing secrets.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '20'
      pre-release-script:
        description: 'Optional shell command to run before semantic-release (e.g. chmod +x scripts/update-version-prefix.sh)'
        type: string
        required: false
    secrets:
      GH_RUNNER_PAT:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install release tooling
        run: npm ci --no-fund --no-audit

      - name: Run pre-release script
        if: ${{ inputs.pre-release-script != '' }}
        run: ${{ inputs.pre-release-script }}

      - name: Build pre-release config (skip git push-back)
        if: github.ref_name != 'main'
        run: |
          # Branch protection on develop/release/* requires PRs — github.token cannot push
          # commits directly. Overwrite .releaserc.json to strip @semantic-release/git so
          # semantic-release auto-discovers the modified config. Tags and GitHub releases
          # are still created via API without a direct git push-back.
          python3 << 'EOF'
          import json, shutil
          shutil.copy('.releaserc.json', '.releaserc.original.json')
          config = json.load(open('.releaserc.original.json'))
          config['plugins'] = [
            p for p in config['plugins']
            if not (isinstance(p, list) and p[0] == '@semantic-release/git')
            and p != '@semantic-release/git'
          ]
          json.dump(config, open('.releaserc.json', 'w'), indent=2)
          print("Pre-release config written (no @semantic-release/git):")
          print(json.dumps(config, indent=2))
          EOF

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HUSKY: '0'
        run: npx semantic-release

      - name: Write release summary
        if: always()
        run: |
          git fetch --tags --quiet 2>/dev/null || true
          LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          STATUS="${{ job.status }}"
          STATUS_ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")

          echo "## ${STATUS_ICON} Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${STATUS_ICON} \`${STATUS}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version released** | \`${LATEST_TAG:-none}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LATEST_TAG" ]; then
            echo "| **Release page** | [${LATEST_TAG}](https://github.com/${{ github.repository }}/releases/tag/${LATEST_TAG}) |" >> $GITHUB_STEP_SUMMARY
          fi
