name: .NET CI (Build + Test)

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version to install'
        type: string
        default: '8.0.x'
      solution-path:
        description: 'Path to the .sln file (supports glob, e.g. "*.sln")'
        type: string
        default: '*.sln'
      test-project-path:
        description: 'Path to the test project or glob pattern (e.g. "**/*.Tests.csproj")'
        type: string
        required: true
      nuget-source-url:
        description: 'GitHub Packages NuGet source URL'
        type: string
        default: 'https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json'
      upload-test-results:
        description: 'Upload TRX test results as an artifact'
        type: boolean
        default: true
    secrets:
      NUGET_AUTH_TOKEN:
        description: 'Token for authenticating to GitHub Packages NuGet feed (use secrets.GITHUB_TOKEN from caller)'
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ inputs.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.nuget-source-url }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_AUTH_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-path }}

      - name: Build
        run: dotnet build ${{ inputs.solution-path }} --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ inputs.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.nuget-source-url }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_AUTH_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-path }}

      - name: Run tests
        run: |
          dotnet test ${{ inputs.test-project-path }} \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        if: ${{ inputs.upload-test-results && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx
